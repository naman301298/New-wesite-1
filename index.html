<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonali 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#ffe6f0,#e6ccff);
  overflow-x: hidden;
}

/* Welcome */
#welcome {
  height: 100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

#typing {
  font-size: 2rem;
  width: 80%;
  border-right: 3px solid;
  white-space: nowrap;
  overflow: hidden;
}

/* Button */
.btn {
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background: linear-gradient(45deg,pink,purple);
  color:white;
  cursor:pointer;
  transition:0.3s;
}
.btn:hover { transform: scale(1.1); }

/* Main */
#main {
  display:none;
  text-align:center;
  padding:30px;
}

.title {
  font-size:2.5rem;
  margin-bottom:20px;
  animation:fade 2s ease;
}

/* Glass + 3D */
.card {
  max-width:600px;
  margin:auto;
  padding:20px;
  border-radius:20px;
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(10px);
  transition: transform 0.2s;
}

/* Slider */
.slider {
  display:flex;
  overflow:hidden;
  max-width:600px;
  margin:30px auto;
}
.slide {
  min-width:100%;
}
.slide img {
  width:100%;
  border-radius:20px;
}

/* Surprise */
#surpriseText {
  display:none;
  font-size:1.5rem;
  color:crimson;
}

/* Floating hearts */
.heart {
  position:fixed;
  bottom:0;
  animation:float 6s linear infinite;
}

@keyframes float {
  0% {transform:translateY(0);opacity:1;}
  100% {transform:translateY(-100vh);opacity:0;}
}

@keyframes fade {
  from{opacity:0;transform:scale(0.8);}
  to{opacity:1;transform:scale(1);}
}
</style>
</head>

<body>

<section id="welcome">
  <div id="typing"></div>
  <button class="btn" onclick="start()">Open Your Surprise 🎁</button>
</section>

<section id="main">

  <h1 class="title">Happy Birthday Sonali 🎂✨</h1>

  <div class="card" id="card">
    You are not just special, you are unforgettable.<br>
    Your smile makes everything brighter.<br>
    I’m really lucky to have you in my life 💖
  </div>

  <div class="slider" id="slider">
    <div class="slide"><img src="https://picsum.photos/600/400?1"></div>
    <div class="slide"><img src="https://picsum.photos/600/400?2"></div>
    <div class="slide"><img src="https://picsum.photos/600/400?3"></div>
  </div>

  <button class="btn" onclick="surprise()">Click for a Surprise 💝</button>

  <div id="surpriseText">You mean more than words can say ❤️</div>

  <h3 style="margin-top:40px;">Made with ❤️ just for you, Sonali</h3>

</section>

<script>

/* Typing Effect */
const text = "Hey Sonali 💖, something special is waiting for you...";
let i = 0;
function typing() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 50);
  }
}
typing();

/* Start */
function start() {
  document.getElementById("welcome").style.display="none";
  document.getElementById("main").style.display="block";
  createHearts();
}

/* Slider */
let index=0;
setInterval(()=>{
  index=(index+1)%3;
  document.getElementById("slider").style.transform=`translateX(-${index*100}%)`;
},3000);

/* Surprise + Fireworks */
function surprise() {
  document.getElementById("surpriseText").style.display="block";

  for(let i=0;i<5;i++){
    setTimeout(()=>{
      confetti({
        particleCount:150,
        spread:100,
        origin:{ y:0.6 }
      });
    }, i*300);
  }
}

/* Hearts */
function createHearts(){
  setInterval(()=>{
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💖";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=Math.random()*20+10+"px";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),6000);
  },400);
}

/* 3D Tilt Effect */
const card = document.getElementById("card");
card.addEventListener("mousemove", (e)=>{
  let x = e.offsetX;
  let y = e.offsetY;
  let rotateX = (y / 200) * 20;
  let rotateY = (x / 200) * -20;
  card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
});
card.addEventListener("mouseleave", ()=>{
  card.style.transform = "rotateX(0) rotateY(0)";
});

</script>

</body>
</html>
